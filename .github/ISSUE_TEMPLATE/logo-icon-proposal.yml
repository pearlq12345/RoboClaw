name: Logo / Icon Proposal
description: Propose a logo, icon, mascot, or visual identity direction for RoboClaw.
title: "[Logo Proposal]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this form to propose a visual direction for RoboClaw. If possible, link sketches, references, or image drafts in the final issue body after submitting.
  - type: dropdown
    id: proposal_type
    attributes:
      label: Proposal Type
      options:
        - Logo
        - Icon
        - Mascot
        - Wordmark
        - Brand direction
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the visual idea.
      placeholder: A concise explanation of the concept.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why this fits RoboClaw
      description: Explain how the idea reflects the project mission or identity.
      placeholder: Why this direction fits an open, co-created embodied AI assistant project.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References or mockups
      description: Paste links to sketches, image references, or prototypes.
      placeholder: Links to images, Figma, issue comments, or related references.
  - type: textarea
    id: open_questions
    attributes:
      label: Open questions
      description: What should the community discuss or vote on?
      placeholder: Color palette, mascot direction, icon shape, typography, and so on.

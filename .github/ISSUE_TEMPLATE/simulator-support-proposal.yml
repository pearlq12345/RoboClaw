name: Simulator Support Proposal
description: Propose support for a simulator or simulation workflow.
title: "[Simulator Support]: "
body:
  - type: input
    id: simulator_name
    attributes:
      label: Simulator name
      placeholder: Isaac Sim, Gazebo, MuJoCo, Habitat, and so on
    validations:
      required: true
  - type: textarea
    id: why_now
    attributes:
      label: Why this simulator matters
      description: Explain why the project should support it.
      placeholder: Community reach, technical fit, realism, learning curve, and so on.
    validations:
      required: true
  - type: textarea
    id: expected_workflows
    attributes:
      label: Expected workflows
      description: What should users be able to test or build with this simulator?
      placeholder: Skill testing, embodiment validation, data collection, task rehearsal, and so on.
    validations:
      required: true
  - type: textarea
    id: integration_surface
    attributes:
      label: Integration surface
      description: Mention APIs, middleware, assets, or required adapters.
      placeholder: ROS bridge, Python API, scene assets, task APIs, and so on.
  - type: textarea
    id: risks
    attributes:
      label: Risks or open questions
      placeholder: Licensing, resource requirements, platform compatibility, maintenance cost, and so on.

name: Robot Support Proposal
description: Propose support for a real robot platform.
title: "[Robot Support]: "
body:
  - type: input
    id: robot_name
    attributes:
      label: Robot name
      placeholder: Unitree Go2, Franka Panda, Stretch, and so on
    validations:
      required: true
  - type: input
    id: vendor
    attributes:
      label: Vendor or project
      placeholder: Vendor, lab, or open-source project name
  - type: textarea
    id: use_cases
    attributes:
      label: Expected use cases
      description: What should RoboClaw enable on this robot?
      placeholder: Navigation, manipulation, teleoperation, semantic task execution, and so on.
    validations:
      required: true
  - type: textarea
    id: why_now
    attributes:
      label: Why support this robot now
      description: Explain why this platform should be prioritized.
      placeholder: Community demand, research value, accessibility, simulator availability, and so on.
    validations:
      required: true
  - type: textarea
    id: integration_surface
    attributes:
      label: Integration surface
      description: Mention SDKs, ROS packages, APIs, drivers, or constraints we should know about.
      placeholder: SDK, ROS2 stack, controller APIs, sensors, and safety notes.
  - type: textarea
    id: risks
    attributes:
      label: Risks or open questions
      placeholder: Hardware access, licensing, docs quality, maintenance cost, and so on.

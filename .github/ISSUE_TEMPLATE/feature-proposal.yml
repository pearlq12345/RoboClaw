name: Feature Proposal
description: Propose a roadmap feature or capability for RoboClaw.
title: "[Feature Proposal]: "
body:
  - type: input
    id: feature_name
    attributes:
      label: Feature name
      placeholder: Semantic skill registry, execution supervisor, simulator task runner, and so on
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem are we solving, or what new capability should we unlock?
      placeholder: Describe the user problem, project gap, or opportunity.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature at a high level.
      placeholder: Explain the idea, behavior, and expected outcome.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Minimum viable scope
      description: What is the smallest useful first version?
      placeholder: Describe the smallest version we should build first.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs or risks
      placeholder: Complexity, compatibility, maintenance cost, or unresolved questions.
